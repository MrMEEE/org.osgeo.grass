app-id: org.osgeo.grass
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: grass
rename-desktop-file: grass.desktop
rename-icon: grass

finish-args:
  - --socket=x11
  - --share=ipc
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=home
  - --filesystem=xdg-documents
  - --socket=session-bus
  - --env=PATH=/app/bin:/app/grass/bin:/usr/bin
  - --env=PYTHONPATH=/app/lib/python3.13/site-packages

modules:
  # Python dependencies
  - name: python3-numpy
    buildsystem: simple
    build-commands:
      - pip3 install --no-index --find-links="file://${PWD}" --prefix=${FLATPAK_DEST} *.whl
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/19/49/4df9123aafa7b539317bf6d342cb6d227e49f7a35b99c287a6109b13dd93/numpy-2.2.6-cp313-cp313-manylinux_2_17_x86_64.manylinux2014_x86_64.whl
        sha256: 1bc23a79bfabc5d056d106f9befb8d50c31ced2fbc70eedb8155aec74a45798f

  # PROJ - Cartographic projection library
  - name: proj
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_TESTING=OFF
    sources:
      - type: archive
        url: https://download.osgeo.org/proj/proj-9.5.1.tar.gz
        sha256: a8395f9696338ffd46b0feb603edbb730fad6746fba77753c77f7f997345e3d3

  # GDAL - Geospatial Data Abstraction Library  
  - name: gdal
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_TESTING=OFF
      - -DGDAL_USE_INTERNAL_LIBS=WHEN_NO_EXTERNAL
      - -DGDAL_ENABLE_DRIVER_JPEG=OFF
    sources:
      - type: archive
        url: https://github.com/OSGeo/gdal/releases/download/v3.10.1/gdal-3.10.1.tar.gz
        sha256: b1c739256d074be42d67c6c3d33eee94c90a490ebb02fcb7fc21c569a6fc78bd

  # GEOS - Geometry Engine
  - name: geos
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_TESTING=OFF
    sources:
      - type: archive
        url: https://download.osgeo.org/geos/geos-3.13.0.tar.bz2
        sha256: 47ec83ff334d672b9e4426695f15da6e6368244214971fabf386ff8ef6df39e4

  # HDF5 - Required by NetCDF
  - name: hdf5
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_TESTING=OFF
      - -DHDF5_BUILD_EXAMPLES=OFF
      - -DHDF5_BUILD_TOOLS=ON
      - -DHDF5_ENABLE_Z_LIB_SUPPORT=ON
    sources:
      - type: archive
        url: https://github.com/HDFGroup/hdf5/archive/refs/tags/hdf5_1.14.5.tar.gz
        sha256: c83996dc79080a34e7b5244a1d5ea076abfd642ec12d7c25388e2fdd81d26350

  # NetCDF
  - name: netcdf
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_TESTING=OFF
      - -DENABLE_DAP=OFF
    sources:
      - type: archive
        url: https://github.com/Unidata/netcdf-c/archive/refs/tags/v4.9.2.tar.gz
        sha256: bc104d101278c68b303359b3dc4192f81592ae8640f1aee486921138f7f88cb7

  # libgeotiff - Required by PDAL
  - name: libgeotiff
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_TESTING=OFF
    sources:
      - type: archive
        url: https://github.com/OSGeo/libgeotiff/releases/download/1.7.3/libgeotiff-1.7.3.tar.gz
        sha256: ba23a3a35980ed3de916e125c739251f8e3266be07540200125a307d7cf5a704

  # PDAL - Point Data Abstraction Library (for LiDAR support)
  - name: pdal
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_TESTING=OFF
      - -DWITH_TESTS=OFF
    sources:
      - type: archive
        url: https://github.com/PDAL/PDAL/releases/download/2.8.4/PDAL-2.8.4-src.tar.bz2
        sha256: c27dc79af0b26f9cb3209b694703e9d576f1b0c8c05b36206fd5e310494e75b5

  # GRASS GIS
  - name: grass
    buildsystem: autotools
    config-opts:
      - --prefix=/app/grass
      - --enable-largefile
      - --with-cxx
      - --with-proj
      - --with-proj-share=/app/share/proj
      - --with-gdal
      - --with-geos
      - --with-sqlite
      - --with-bzlib
      - --with-zstd
      - --with-cairo
      - --with-freetype
      - --with-readline
      - --with-netcdf
      - --with-pdal
      - --without-mysql
      - --without-postgres
      - --without-odbc
      - --without-fftw
      - --without-openmp
    build-commands:
      - make -j${FLATPAK_BUILDER_N_JOBS}
      - make install
      # Create wrapper script in /app/bin
      - |
        cat > /app/bin/grass << 'EOF'
        #!/bin/sh
        export GISBASE=/app/grass
        export PATH="${GISBASE}/bin:${GISBASE}/scripts:${PATH}"
        export LD_LIBRARY_PATH="${GISBASE}/lib:${LD_LIBRARY_PATH}"
        export PYTHONPATH="${GISBASE}/etc/python:${PYTHONPATH}"
        exec "${GISBASE}/bin/grass" "$@"
        EOF
      - chmod +x /app/bin/grass
      # Install desktop file
      - install -Dm644 gui/icons/grass.desktop /app/share/applications/org.osgeo.grass.desktop
      - desktop-file-edit --set-key=Icon --set-value=org.osgeo.grass /app/share/applications/org.osgeo.grass.desktop
      - desktop-file-edit --set-key=Exec --set-value=grass /app/share/applications/org.osgeo.grass.desktop
      # Install icons
      - install -Dm644 gui/icons/grass-64x64.png /app/share/icons/hicolor/64x64/apps/org.osgeo.grass.png
      - install -Dm644 gui/icons/grass-128x128.png /app/share/icons/hicolor/128x128/apps/org.osgeo.grass.png
      - install -Dm644 gui/icons/grass-192x192.png /app/share/icons/hicolor/192x192/apps/org.osgeo.grass.png
      # Install AppStream metadata
      - install -Dm644 org.osgeo.grass.metainfo.xml /app/share/metainfo/org.osgeo.grass.metainfo.xml
    sources:
      - type: archive
        url: https://github.com/OSGeo/grass/releases/download/8.4.2/grass-8.4.2.tar.gz
        sha256: 68abc6c119939e40736a96360e9f6ab73e56f74772ec88c31688136215047a8c
      
      - type: file
        path: org.osgeo.grass.metainfo.xml
